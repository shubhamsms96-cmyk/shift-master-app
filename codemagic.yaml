workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      vars:
        PACKAGE_NAME: "com.shiftmaster.app"
    scripts:
      - name: Build APK
        script: |
          ./gradlew assembleRelease
      - name: Build AAB
        script: |
          ./gradlew bundleRelease
    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab
